<article class="tool-card">
  <header>
    <h2>
      <a href="/blogs/{{slug}}/">
        {{title}}
      </a>
    </h2>

    <div class="blog-meta">
      <time datetime="{{published}}">
        {{published}}
      </time>

      <span>•</span>

      <!-- <span>{{readingTime}} min read</span> -->
    </div>
  </header>

  <p>
    {{description}}
  </p>

  <a class="tool-link" href="/blogs/{{slug}}/">
    Read Blog
  </a>
</article>
