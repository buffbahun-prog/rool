<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Responsive Design -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title (Most Important SEO Tag) -->
  <title>{{pageTitle}} | {{brandName}}</title>

  <!-- Meta Description -->
  <meta
    name="description"
    content="{{metaDescription}}"
  />

  <!-- Search Engine Instructions -->
  <meta name="robots" content="index, follow" />

  <!-- Canonical URL -->
  <link
    rel="canonical"
    href="{{canonicalUrl}}"
  />

  <!-- Author -->
  <meta name="author" content="{{author}}" />

  <!-- Language -->
  <meta http-equiv="content-language" content="en" />

  <!-- Theme Color -->
  <meta name="theme-color" content="{{themeColor}}" />

  <!-- Favicon -->
  <link rel="icon" href="{{faviconPath}}" sizes="any" />
  <link rel="apple-touch-icon" href="{{appleFaviconPath}}" />

  <!-- Open Graph -->
  <meta property="og:type" content="{{siteType}}" />
  <meta property="og:title" content="{{pageTitle}} | {{brandName}}" />
  <meta
    property="og:description"
    content="{{ogDescription}}"
  />
  <meta
    property="og:image"
    content="{{ogImage}}"
  />
  <meta
    property="og:url"
    content="{{canonicalUrl}}"
  />
  <meta property="og:site_name" content="{{brandName}}" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter/X Cards -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{pageTitle}}" />
  <meta
    name="twitter:description"
    content="{{twitterDescription}}"
  />
  <meta
    name="twitter:image"
    content="{{twitterImage}}"
  />

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "{{pageTitle}}",
    "description": "{{metaDescription}}",
    "url": "{{canonicalUrl}}"
  }
  </script>

  <meta name="application-name" content="{{utilityName}}" />
  
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "{{utilityName}}",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Any",
      "url": "{{canonicalUrl}}",
      "description": "{{metaDescription}}",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
  <script type="application/ld+json">
    {{faq}}
  </script>
</head>
<body>
    <header class="main-header">
        <a href="/" aria-label="Rool home page">
            <img
              src="/assets/logo.svg"
              alt="Rool utility tool logo"
              width="80"
              loading="lazy"
            >
        </a>
        <nav aria-label="Main navigation">
            <ul class="menu-list">
                {{navMenu}}
            </ul>
        </nav>
    </header>
</body>
</html>
