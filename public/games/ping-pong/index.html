<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <title>QR WebRTC Orientation</title>
    <script>
  var vConsole = new window.VConsole();
</script>
  </head>
  <body>
    <h1>QR WebRTC Orientation Demo</h1>

<!-- <button id="startHost">Start Host</button>
<button id="startMobile">Start Mobile</button>
<button id="endConnection">End Connection</button> -->
<canvas id="gameCanvas" class=""></canvas>

    <!-- UI Overlay -->
    <div id="ui-layer" class="">
        <!-- Score Board -->
        <div class="score-container">
            <div class="score-card">
                <p class="score-label">Top Score</p>
                <h2 id="top-score-ui" class="score-value top-score">0</h2>
            </div>
            <div class="score-card right">
                <p class="score-label">Bottom Score</p>
                <h2 id="bottom-score-ui" class="score-value bottom-score">0</h2>
            </div>
        </div>

        <!-- Center Prompt (Start/GameOver) -->
        <div id="menu" class="pointer-events-auto">
            <h1 id="menu-title" class="neon-text">NEON PONG</h1>
            <p id="menu-desc" class="menu-desc">Tilt your phone to move the paddles.<br>Hit the ball while moving to add spin!</p>
            <button id="start-btn">START GAME</button>
            <div id="calibration-info" class="calibration-info">
                Click Start to Calibrate Current Angle as 0°
            </div>
        </div>

        <!-- Debug Info -->
        <div id="debug">
            Tilt: <span id="tilt-val">0</span>
        </div>
    </div>
<pre id="log"></pre>
    <script type="module" src="/src/main.js"></script>
    <style>

      #ui-layer.hidden, #gameCanvas.hidden {
        display: none;
      }

canvas {
            display: block;
            touch-action: none;
        }

#gameCanvas {
  position: absolute;
  z-index: 200;
}
        .neon-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
        }
        #ui-layer {
            pointer-events: none;
            z-index: 300;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }

video {
  width: 200px;
}

pre { padding: 10px; }

#qrPopover {
  border: none;
  border-radius: 16px;
  /* padding: 20px; */
  text-align: center;
  
}

#qrPopover::backdrop {
  background: rgba(0,0,0,0.6);
}

#qrPopover > canvas {
  width: 50dvw !important;
  height: 50dvw !important;
}

:root {
            --bg-dark: #0f172a;
            --slate-700: #334155;
            --slate-400: #94a3b8;
            --blue-600: #2563eb;
            --blue-500: #3b82f6;
            --green-400: #4ade80;
            --neon-blue: rgba(56, 189, 248, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        /* UI Overlay Layout */
        #ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            pointer-events: none;
            box-sizing: border-box;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        /* Scoreboard Styling */
        .score-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--slate-700);
            padding: 1rem;
            border-radius: 0.75rem;
            min-width: 100px;
        }

        .score-card.right {
            text-align: right;
        }

        .score-label {
            color: var(--slate-400);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin: 0;
        }

        .score-value {
            font-size: 1.875rem;
            font-weight: 900;
            margin: 0;
        }

        .top-score { color: var(--green-400); }
        .bottom-score { color: var(--blue-500); }

        /* Menu Styling */
        #menu {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--slate-700);
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            max-width: 90%;
        }

        .menu-hidden {
            opacity: 0;
            transform: scale(0.9);
        }

        .neon-text {
            color: white;
            font-size: 2.25rem;
            font-weight: 900;
            margin: 0 0 0.5rem 0;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .menu-desc {
            color: var(--slate-400);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        /* Button Styling */
        #start-btn {
            background-color: var(--blue-600);
            color: white;
            font-weight: 700;
            padding: 0.75rem 2.5rem;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        #start-btn:hover {
            background-color: var(--blue-500);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        .calibration-info {
            margin-top: 1rem;
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: -0.025em;
        }

        #debug {
            font-size: 10px;
            color: #475569;
            align-self: flex-start;
            opacity: 0;
        }

        h1 {
            color: gray;
        }
</style>
  </body>
</html>
